<!DOCTYPE html>
<html lang="ru">
<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #0d0d0d !important; color: #f0ede6; font-family: -apple-system, 'SF Pro Text', sans-serif; overflow: hidden; }

/* SCREENS */
.screen { display: none; position: absolute; inset: 0; }
.screen.active { display: flex; flex-direction: column; }

/* HOME */
#home { align-items: center; justify-content: flex-end; padding-bottom: 48px; }
.home-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.home-logo-wrap { text-align: center; }
.home-glyph { font-size: 64px; opacity: 0.08; line-height: 1; margin-bottom: 24px; }
.home-title { font-size: 42px; font-weight: 300; letter-spacing: -0.5px; color: #f0ede6; margin-bottom: 8px; }
.home-sub { font-size: 15px; color: rgba(240,237,230,0.4); letter-spacing: 0.02em; }
.home-btns { position: relative; z-index: 2; width: 100%; padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
.btn-primary { width: 100%; padding: 18px; background: #c4a96a; border: none; border-radius: 14px; color: #0d0d0d; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-primary:active { opacity: 0.8; }
.btn-row { display: flex; gap: 12px; }
.btn-secondary { flex: 1; padding: 16px; background: rgba(255,255,255,0.08); border: none; border-radius: 14px; color: #c4a96a; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn-secondary:active { opacity: 0.7; }

/* SCAN */
#scan { background: #000; }
.scan-video-wrap { flex: 1; position: relative; overflow: hidden; }
#scanVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
#scanCanvas { display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.scan-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 24px 0 20px; pointer-events: none; }
.scan-top { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 20px; pointer-events: all; }
.scan-back { width: 36px; height: 36px; background: rgba(0,0,0,0.5); border-radius: 50%; border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.scan-title-lbl { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 0.05em; text-transform: uppercase; }
.scan-frame { width: 72%; aspect-ratio: 1; position: relative; }
.scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 28px; height: 28px; border-color: rgba(196,169,106,0.8); border-style: solid; }
.scan-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.scan-frame::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
.scan-frame-inner::before, .scan-frame-inner::after { content: ''; position: absolute; width: 28px; height: 28px; border-color: rgba(196,169,106,0.8); border-style: solid; }
.scan-frame-inner::before { top: 0; right: 0; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
.scan-frame-inner::after { bottom: 0; left: 0; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
.scan-hint { font-size: 13px; color: rgba(255,255,255,0.55); text-align: center; padding: 0 40px; }
.scan-bottom { width: 100%; padding: 0 24px 8px; pointer-events: all; }
.scan-result-badge { background: rgba(0,0,0,0.75); border-radius: 12px; padding: 14px 18px; margin-bottom: 14px; display: none; }
.scan-result-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.scan-result-pct { font-size: 13px; color: #c4a96a; }
.scan-btn { width: 100%; padding: 18px; background: #c4a96a; border: none; border-radius: 14px; color: #0d0d0d; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.scan-btn:disabled { background: rgba(196,169,106,0.3); color: rgba(240,237,230,0.3); }
.scan-btn:not(:disabled):active { opacity: 0.85; }

/* ADD STONE */
#addStone { background: #0d0d0d; }
.add-video-wrap { flex: 0 0 45vh; position: relative; overflow: hidden; background: #000; }
#addVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
.add-counter { position: absolute; top: 16px; left: 0; right: 0; text-align: center; }
.add-counter-badge { display: inline-block; background: rgba(0,0,0,0.65); border-radius: 20px; padding: 6px 16px; font-size: 14px; color: rgba(255,255,255,0.9); letter-spacing: 0.05em; }
.add-shots-strip { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; background: #111; flex-shrink: 0; }
.add-shots-strip::-webkit-scrollbar { display: none; }
.shot-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(196,169,106,0.5); }
.shot-empty { width: 52px; height: 52px; border-radius: 8px; flex-shrink: 0; border: 1.5px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 20px; color: rgba(255,255,255,0.15); }
.add-form { flex: 1; overflow-y: auto; padding: 16px 20px; }
.add-form-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.add-form-sub { font-size: 13px; color: rgba(240,237,230,0.4); margin-bottom: 18px; }
.field { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #f0ede6; font-size: 16px; outline: none; margin-bottom: 12px; font-family: inherit; transition: border-color 0.2s; }
.field:focus { border-color: rgba(196,169,106,0.6); }
.field::placeholder { color: rgba(240,237,230,0.3); }
.add-shoot-btn { width: 100%; padding: 16px; background: rgba(196,169,106,0.15); border: 1.5px solid rgba(196,169,106,0.4); border-radius: 14px; color: #c4a96a; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; font-family: inherit; transition: all 0.15s; }
.add-shoot-btn:active { background: rgba(196,169,106,0.25); }
.add-save-btn { width: 100%; padding: 17px; background: #c4a96a; border: none; border-radius: 14px; color: #0d0d0d; font-size: 17px; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-family: inherit; transition: opacity 0.15s; }
.add-save-btn:disabled { opacity: 0.3; cursor: default; }
.add-save-btn:not(:disabled):active { opacity: 0.85; }
.add-cancel-btn { width: 100%; padding: 14px; background: transparent; border: none; color: rgba(240,237,230,0.4); font-size: 15px; cursor: pointer; font-family: inherit; }

/* MY STONES */
#myStones { background: #0d0d0d; }
.list-header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.list-title { font-size: 28px; font-weight: 700; }
.list-back { background: none; border: none; color: #c4a96a; font-size: 15px; cursor: pointer; font-family: inherit; }
.stones-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.stone-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.07); cursor: pointer; }
.stone-row:active { opacity: 0.7; }
.stone-thumb { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); }
.stone-thumb-ph { width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 22px; color: rgba(255,255,255,0.2); }
.stone-info { flex: 1; min-width: 0; }
.stone-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stone-meta { font-size: 12px; color: rgba(240,237,230,0.4); margin-top: 2px; }
.stone-del { padding: 6px 10px; background: none; border: none; color: rgba(196,169,106,0.6); font-size: 13px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.empty-list { text-align: center; padding: 60px 20px; color: rgba(240,237,230,0.3); }
.empty-list .eg { font-size: 48px; margin-bottom: 14px; }
.empty-list p { font-size: 15px; }

/* ADMIN */
#adminLogin { background: #0d0d0d; align-items: center; justify-content: center; padding: 40px 32px; }
.admin-title { font-size: 28px; font-weight: 600; margin-bottom: 8px; text-align: center; }
.admin-sub { font-size: 14px; color: rgba(240,237,230,0.4); text-align: center; margin-bottom: 36px; }
.admin-err { font-size: 13px; color: #e05c5c; margin-top: -8px; margin-bottom: 14px; display: none; text-align: center; }
.admin-out-btn { margin-top: 12px; width: 100%; padding: 14px; background: transparent; border: 1px solid rgba(224,92,92,0.3); border-radius: 12px; color: #e05c5c; font-size: 15px; cursor: pointer; font-family: inherit; }

/* RESULT DETAIL */
#resultDetail { background: #0d0d0d; overflow-y: auto; }
.detail-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.detail-body { padding: 24px 20px 40px; }
.detail-pct { font-size: 48px; font-weight: 300; color: #c4a96a; line-height: 1; margin-bottom: 4px; }
.detail-match-lbl { font-size: 12px; color: rgba(240,237,230,0.4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
.detail-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.detail-desc { font-size: 15px; color: rgba(240,237,230,0.6); line-height: 1.6; margin-bottom: 24px; }
.detail-id { font-size: 11px; color: rgba(196,169,106,0.35); letter-spacing: 0.08em; word-break: break-all; margin-bottom: 24px; font-family: 'SF Mono', monospace; }
.detail-cta { display: flex; align-items: center; gap: 14px; padding: 18px; background: rgba(196,169,106,0.1); border: 1px solid rgba(196,169,106,0.25); border-radius: 16px; color: #f0ede6; text-decoration: none; margin-bottom: 16px; transition: all 0.2s; }
.detail-cta:active { background: rgba(196,169,106,0.18); }
.detail-cta-ico { width: 40px; height: 40px; border: 1px solid rgba(196,169,106,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.detail-cta-main { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.detail-cta-sub { font-size: 12px; color: rgba(240,237,230,0.5); }
.detail-back { width: 100%; padding: 16px; background: rgba(255,255,255,0.07); border: none; border-radius: 14px; color: rgba(240,237,230,0.7); font-size: 16px; cursor: pointer; font-family: inherit; margin-top: 8px; }

/* SAVING */
.veil { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
.veil-ring { width: 40px; height: 40px; border: 2px solid rgba(196,169,106,0.2); border-top-color: #c4a96a; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.veil-lbl { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #c4a96a; }

input[type=file] { display: none; }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-bg">
    <div class="home-logo-wrap">
      <div class="home-glyph">◈</div>

</div>

<!-- ADMIN LOGIN -->
<div class="screen" id="adminLogin">
  <button style="position:absolute;top:20px;left:20px;background:none;border:none;color:rgba(240,237,230,0.5);font-size:22px;cursor:pointer" onclick="goHome()">✕</button>
  <div class="admin-title">Вход</div>
  <div class="admin-sub">Только владелец может добавлять камни</div>
  <input class="field" type="password" id="adminPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')tryLogin()" style="width:100%;max-width:320px;">
  <div class="admin-err" id="adminErr">Неверный пароль</div>
  <button class="btn-primary" onclick="tryLogin()" style="width:100%;max-width:320px;">Войти</button>

    <div class="detail-desc" id="detailDesc"></div>
    <div class="detail-id" id="detailId"></div>
    <a id="detailCta" class="detail-cta" href="#" target="_blank" style="display:none">
      <div class="detail-cta-ico" id="detailCtaIco">🔗</div>
      <div>
        <div class="detail-cta-main" id="detailCtaMain">Перейти</div>
        <div class="detail-cta-sub" id="detailCtaSub"></div>
      </div>
    </a>
    <button class="detail-back" onclick="goScan()">← Сканировать ещё</button>
  </div>
</div>

<script>
const PROJECT = 'jadekey-46f37';
const API_KEY = 'AIzaSyCmc4qJFC0rkFvcz7ZBG42ApnZfCcrrT20';
const BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT + '/databases/(default)/documents';
const ADMIN_PASS = 'jadekey2024';
const THRESHOLD = 0.76;
const MIN_SHOTS = 3;
const MAX_SHOTS = 7;

let dataset = [];
let isAdmin = false;
let sharedStream = null;
let addShots = [];

if (sessionStorage.getItem('jk_admin')) isAdmin = true;
loadData();

// Request camera permission immediately on load
async function initCamera() {
  try {
    if (sharedStream) return;
    sharedStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1920 } }
    });
    const track = sharedStream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
      try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch(e) {}
    }
  } catch(e) { console.log('Camera init:', e.message); }
}
// FIRESTORE REST
function fsVal(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'string') return { stringValue: v };
  if (typeof v === 'number') return { doubleValue: v };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(fsVal) } };
  if (typeof v === 'object') { const f = {}; for (const k in v) f[k] = fsVal(v[k]); return { mapValue: { fields: f } }; }
  return { stringValue: String(v) };
}
function fromFs(fields) {
  if (!fields) return {};
  const o = {};
  for (const k in fields) {
    const v = fields[k];
    if ('stringValue' in v) o[k] = v.stringValue;
    else if ('doubleValue' in v) o[k] = v.doubleValue;
    else if ('integerValue' in v) o[k] = Number(v.integerValue);
    else if ('booleanValue' in v) o[k] = v.booleanValue;
    else if ('nullValue' in v) o[k] = null;
    else if ('arrayValue' in v) o[k] = (v.arrayValue.values || []).map(x => fromFs({ _: x })['_']);
    else if ('mapValue' in v) o[k] = fromFs(v.mapValue.fields || {});
  }
  return o;
}

async function loadData() {
  try {
    const r = await fetch(BASE + '/stones?key=' + API_KEY + '&pageSize=100');
    const j = await r.json();
    dataset = j.documents ? j.documents.map(d => ({ id: d.name.split('/').pop(), ...fromFs(d.fields) })) : [];
  } catch(e) { dataset = []; }
}

async function fsAdd(data) {
  const r = await fetch(BASE + '/stones?key=' + API_KEY, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: Object.fromEntries(Object.entries(data).map(([k,v]) => [k, fsVal(v)])) })
  });
  return r.json();
}

async function fsDelete(id) {
  await fetch(BASE + '/stones/' + id + '?key=' + API_KEY, { method: 'DELETE' });
}

// NAVIGATION
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  // Don't stop stream, keep it alive
  showScreen('home');
}

function goScan() {
  showScreen('scan');
  startCam('scanVideo');
}

function goAdd() {
  if (!isAdmin) { showScreen('adminLogin'); updateAdminUI(); return; }
  addShots = [];
  document.getElementById('addName').value = '';
  document.getElementById('addLink').value = '';
  document.getElementById('addCounter').textContent = '0/7 фото';
  document.getElementById('addSaveBtn').disabled = true;
  renderStrip();
  showScreen('addStone');
  startCam('addVideo');
}

function goMyStones() {
  if (!isAdmin) { showScreen('adminLogin'); updateAdminUI(); return; }
  renderStonesList();
  showScreen('myStones');
}

async function startCam(videoId) {
  const v = document.getElementById(videoId);
  try {
    // Stop any existing stream
    if (sharedStream) {
      sharedStream.getTracks().forEach(t => t.stop());
      sharedStream = null;
    }
    sharedStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1920 } }
    });
    v.srcObject = sharedStream;
    await v.play();
    const track = sharedStream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
      try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch(e) {}
    }
    // Clear any error hint
    if (videoId === 'scanVideo') document.getElementById('scanHint').textContent = 'Наведите на камень и нажмите кнопку';
  } catch(e) {
    if (videoId === 'scanVideo') document.getElementById('scanHint').textContent = 'Камера недоступна — разрешите доступ';
    console.log('Camera error:', e.message);
  }
}

// ADMIN
function tryLogin() {
  if (document.getElementById('adminPass').value === ADMIN_PASS) {
    isAdmin = true; sessionStorage.setItem('jk_admin', '1');
    document.getElementById('adminErr').style.display = 'none';
    document.getElementById('adminPass').value = '';
    goHome();
  } else {
    document.getElementById('adminErr').style.display = 'block';
  }
}
function doLogout() { isAdmin = false; sessionStorage.removeItem('jk_admin'); goHome(); }
function updateAdminUI() {
  document.getElementById('logoutBtn').style.display = isAdmin ? 'block' : 'none';
}

// SHOOT (ADD MODE)
async function shootPhoto() {
  if (addShots.length >= MAX_SHOTS) return;
  const v = document.getElementById('addVideo');
  if (!v.srcObject) return;
  const c = document.createElement('canvas');
  c.width = v.videoWidth || 640; c.height = v.videoHeight || 640;
  c.getContext('2d').drawImage(v, 0, 0);
  const dataUrl = await compressCanvas(c);
  const features = await getFeaturesFromUrl(dataUrl);
  addShots.push({ dataUrl, features });
  renderStrip();
  updateAddCounter();
}

function renderStrip() {
  const strip = document.getElementById('shotsStrip');
  strip.innerHTML = '';
  addShots.forEach((s, i) => {
    const img = document.createElement('img');
    img.className = 'shot-thumb'; img.src = s.dataUrl;
    img.onclick = () => { addShots.splice(i, 1); renderStrip(); updateAddCounter(); };
    strip.appendChild(img);
  });
  for (let i = addShots.length; i < MAX_SHOTS; i++) {
    const ph = document.createElement('div'); ph.className = 'shot-empty'; ph.textContent = '+';
    strip.appendChild(ph);
  }
}

function updateAddCounter() {
  const n = addShots.length;
  document.getElementById('addCounter').textContent = n + '/7 фото';
  document.getElementById('addSaveBtn').disabled = n < MIN_SHOTS;
  document.getElementById('addFormSub').textContent = n >= MIN_SHOTS ? 'Можно сохранить или добавить ещё' : 'Сделайте минимум 3 снимка с разных углов';
}

// SAVE
async function saveNewStone() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('Введите название'); return; }
  if (addShots.length < MIN_SHOTS) return;
  showVeil('Сохранение…');
  try {
    // Only store features + tiny cover image to stay under Firestore 1MB limit
    const tinyCover = await makeTiny(addShots[0].dataUrl, 200);
    await fsAdd({
      name,
      link: document.getElementById('addLink').value.trim(),
      createdAt: Date.now(),
      shotsCount: addShots.length,
      coverImage: tinyCover,
      features: addShots[0].features,
      shotsFeatures: addShots.map(s => s.features)
    });
    await loadData();
    hideVeil();
    renderStonesList();
    showScreen('myStones');
  } catch(e) { hideVeil(); alert('Ошибка: ' + e.message); }
}

// STONES LIST
function renderStonesList() {
  const list = document.getElementById('stonesList');
  if (dataset.length === 0) {
    list.innerHTML = '<div class="empty-list"><div class="eg">◇</div><p>Камней пока нет</p></div>';
    return;
  }
  list.innerHTML = '';
  dataset.forEach(s => {
    const row = document.createElement('div'); row.className = 'stone-row';
    const thumb = s.coverImage ? `<img class="stone-thumb" src="${s.coverImage}">` : `<div class="stone-thumb-ph">◈</div>`;
    const shots = s.shotsCount || 1;
    row.innerHTML = `${thumb}<div class="stone-info"><div class="stone-name">${esc(s.name)}</div><div class="stone-meta">${shots} снимк${shots===1?'':shots<5?'а':'ов'} · ${esc(s.link||'—')}</div></div><button class="stone-del" onclick="delStone('${s.id}',event)">Удалить</button>`;
    list.appendChild(row);
  });
}

async function delStone(id, e) {
  e.stopPropagation();
  if (!confirm('Удалить?')) return;
  showVeil('Удаление…');
  await fsDelete(id);
  await loadData();
  hideVeil();
  renderStonesList();
}

// SCAN
async function doScan() {
  if (dataset.length === 0) {
    document.getElementById('scanHint').textContent = 'База пуста — добавьте камни';
    return;
  }
  const v = document.getElementById('scanVideo');
  if (!v.srcObject || !v.videoWidth) {
    document.getElementById('scanHint').textContent = 'Камера не готова';
    return;
  }
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanBtn').textContent = 'Анализ…';
  document.getElementById('scanHint').textContent = 'Идёт сравнение…';
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  const src = c.toDataURL('image/jpeg', 0.9);
  const qf = await getFeaturesFromUrl(src);
  let best = null, bestScore = -1;
  for (const stone of dataset) {
    const allF = [];
    if (stone.features && stone.features.length) allF.push(stone.features);
    if (stone.shotsFeatures) stone.shotsFeatures.forEach(f => { if (f && f.length) allF.push(f); });
    for (const f of allF) {
      const sc = cosine(qf, f);
      if (sc > bestScore) { bestScore = sc; best = stone; }
    }
  }
  document.getElementById('scanBtn').disabled = false;
  document.getElementById('scanBtn').textContent = 'Идентифицировать';
  if (best && bestScore >= THRESHOLD) {
    document.getElementById('scanHint').textContent = '✓ ' + best.name;
    showScanBadge(best, bestScore);
    setTimeout(() => showResultDetail(best, bestScore), 800);
  } else {
    document.getElementById('scanHint').textContent = '∅ Не найдено (' + (bestScore*100).toFixed(1) + '%)';
    hideScanBadge();
  }
}

function showScanBadge(stone, score) {
  document.getElementById('scanBadgeName').textContent = stone.name;
  document.getElementById('scanBadgePct').textContent = (score*100).toFixed(1) + '% совпадение';
  document.getElementById('scanBadge').style.display = 'block';
}
function hideScanBadge() { document.getElementById('scanBadge').style.display = 'none'; }

function showResultDetail(stone, score) {
  const img = document.getElementById('detailImg');
  if (stone.coverImage) { img.src = stone.coverImage; img.style.display = 'block'; }
  else img.style.display = 'none';
  document.getElementById('detailPct').textContent = (score*100).toFixed(1) + '%';
  document.getElementById('detailName').textContent = stone.name;
  document.getElementById('detailDesc').textContent = stone.desc || '';
  document.getElementById('detailId').textContent = stone.features ? 'ID: ' + hashF(stone.features) : '';
  const cta = document.getElementById('detailCta');
  if (stone.link) {
    cta.href = buildHref(stone.link);
    document.getElementById('detailCtaIco').textContent = getIcon(stone.link);
    document.getElementById('detailCtaMain').textContent = getLabel(stone.link);
    document.getElementById('detailCtaSub').textContent = stone.link;
    cta.style.display = 'flex';
    setTimeout(() => window.open(buildHref(stone.link), '_blank'), 1500);
  } else { cta.style.display = 'none'; }
  showScreen('resultDetail');
}

function buildHref(val) {
  if (!val) return '#';
  if (val.startsWith('http')) return val;
  if (val.startsWith('@') || val.includes('t.me')) return 'https://t.me/' + val.replace('@','');
  if (val.includes('@')) return 'mailto:' + val;
  return 'https://' + val;
}
function getIcon(val) {
  if (!val) return '🔗';
  if (val.includes('t.me') || val.startsWith('@')) return '✈️';
  if (val.includes('@') && !val.startsWith('http')) return '✉️';
  return '🔗';
}
function getLabel(val) {
  if (!val) return 'Перейти';
  if (val.includes('t.me') || val.startsWith('@')) return 'Написать в Telegram';
  if (val.includes('@') && !val.startsWith('http')) return 'Написать письмо';
  return 'Открыть сайт';
}

// FEATURES
function getFeaturesFromUrl(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const s=128, c=document.createElement('canvas'); c.width=s; c.height=s;
      c.getContext('2d').drawImage(img,0,0,s,s);
      resolve(extractF(c.getContext('2d').getImageData(0,0,s,s).data,s,s));
    };
    img.src = src;
  });
}
function extractF(data,W,H){
  const f=[],bins=32,hR=new Array(bins).fill(0),hG=new Array(bins).fill(0),hB=new Array(bins).fill(0),total=W*H;
  for(let i=0;i<data.length;i+=4){hR[Math.floor(data[i]/(256/bins))]++;hG[Math.floor(data[i+1]/(256/bins))]++;hB[Math.floor(data[i+2]/(256/bins))]++;}
  hR.forEach(v=>f.push(v/total));hG.forEach(v=>f.push(v/total));hB.forEach(v=>f.push(v/total));
  const gN=4,cW=Math.floor(W/gN),cH=Math.floor(H/gN);
  for(let gy=0;gy<gN;gy++)for(let gx=0;gx<gN;gx++){
    let sR=0,sG=0,sB=0,cnt=0,ssR=0,ssG=0,ssB=0;
    for(let y=gy*cH;y<(gy+1)*cH&&y<H;y++)for(let x=gx*cW;x<(gx+1)*cW&&x<W;x++){const idx=(y*W+x)*4;sR+=data[idx];sG+=data[idx+1];sB+=data[idx+2];cnt++;}
    const mR=sR/cnt/255,mG=sG/cnt/255,mB=sB/cnt/255;
    for(let y=gy*cH;y<(gy+1)*cH&&y<H;y++)for(let x=gx*cW;x<(gx+1)*cW&&x<W;x++){const idx=(y*W+x)*4;ssR+=Math.pow(data[idx]/255-mR,2);ssG+=Math.pow(data[idx+1]/255-mG,2);ssB+=Math.pow(data[idx+2]/255-mB,2);}
    f.push(mR,mG,mB,Math.sqrt(ssR/cnt),Math.sqrt(ssG/cnt),Math.sqrt(ssB/cnt));
  }
  const zones=[[0,0,0.5,0.5],[0.5,0,1,0.5],[0,0.5,0.5,1],[0.5,0.5,1,1]];
  for(const[x0,y0,x1,y1]of zones){
    let e=0,cnt=0;
    for(let y=Math.floor(y0*H)+1;y<Math.floor(y1*H)-1;y++)for(let x=Math.floor(x0*W)+1;x<Math.floor(x1*W)-1;x++){
      const g=(px,py)=>{const idx=(py*W+px)*4;return(data[idx]*0.299+data[idx+1]*0.587+data[idx+2]*0.114)/255;};
      const gx2=g(x+1,y)-g(x-1,y),gy2=g(x,y+1)-g(x,y-1);e+=Math.sqrt(gx2*gx2+gy2*gy2);cnt++;
    }
    f.push(e/cnt);
  }
  const hh=new Array(16).fill(0);
  for(let i=0;i<data.length;i+=4){const r=data[i]/255,g=data[i+1]/255,b=data[i+2]/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;if(d<0.05)continue;let h=0;if(mx===r)h=(g-b)/d%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=((h*60)+360)%360;hh[Math.floor(h/22.5)]++;}
  const ht=hh.reduce((a,b)=>a+b,1);hh.forEach(v=>f.push(v/ht));
  return f;
}
function cosine(a,b){let dot=0,na=0,nb=0;const len=Math.min(a.length,b.length);for(let i=0;i<len;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return dot/(Math.sqrt(na)*Math.sqrt(nb)+1e-9);}
function hashF(f){if(!f||!f.length)return'—';return CryptoJS.SHA256(f.slice(0,20).map(v=>v.toFixed(3)).join(',')).toString().slice(0,16).toUpperCase();}
async function compressCanvas(c){const max=480,scale=Math.min(max/c.width,max/c.height,1);const c2=document.createElement('canvas');c2.width=Math.round(c.width*scale);c2.height=Math.round(c.height*scale);c2.getContext('2d').drawImage(c,0,0,c2.width,c2.height);return c2.toDataURL('image/jpeg',0.68);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function makeTiny(src, maxSize) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale);
      c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.5));
    };
    img.src = src;
  });
}
function showVeil(msg){let el=document.getElementById('veil');if(!el){el=document.createElement('div');el.id='veil';el.className='veil';el.innerHTML=`<div class="veil-ring"></div><div class="veil-lbl">${msg}</div>`;document.body.appendChild(el);}}
function hideVeil(){const el=document.getElementById('veil');if(el)el.remove();}
</script>
