<script>
const PROJECT = 'jadekey-46f37';
const API_KEY = 'AIzaSyCmc4qJFC0rkFvcz7ZBG42ApnZfCcrrT20';
const BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT + '/databases/(default)/documents';
const ADMIN_PASS = 'jadekey2024';
const EMBED_URL = 'https://jadekey.onrender.com/embed';
const THRESHOLD = 0.76;
const MIN_SHOTS = 3;
const MAX_SHOTS = 7;

let dataset = [], isAdmin = false, sharedStream = null, addShots = [];
let activeContacts = new Set();

if (sessionStorage.getItem('jk_admin')) isAdmin = true;
loadData();

function openLink(url) {
  try {
    if (url.startsWith('tel:')) {
      const num = url.replace('tel:', '');
      if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.showPopup({
          title: 'Телефон',
          message: num,
          buttons: [{ type: 'default', text: 'Скопировать' }, { type: 'cancel', text: 'Закрыть' }]
        }, (btn) => { if (btn !== 'cancel' && navigator.clipboard) navigator.clipboard.writeText(num); });
      } else {
        window.location.href = url;
      }
    } else if (url.startsWith('mailto:')) {
      window.location.href = url;
    } else if (url.startsWith('https://t.me/')) {
      if (window.Telegram && Telegram.WebApp && Telegram.WebApp.openTelegramLink) {
        Telegram.WebApp.openTelegramLink(url);
      } else {
        window.open(url, '_blank');
      }
    } else {
      if (window.Telegram && Telegram.WebApp && Telegram.WebApp.openLink) {
        Telegram.WebApp.openLink(url);
      } else {
        window.open(url, '_blank');
      }
    }
  } catch(e) {
    window.open(url, '_blank');
  }
}

function toggleContact(key) {
  const tog = document.getElementById('tog-' + key);
  const wrap = document.getElementById('wrap-' + key);
  if (activeContacts.has(key)) {
    activeContacts.delete(key);
    tog.classList.remove('active');
    wrap.classList.remove('visible');
  } else {
    activeContacts.add(key);
    tog.classList.add('active');
    wrap.classList.add('visible');
  }
}

function fsVal(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'string') return { stringValue: v };
  if (typeof v === 'number') return { doubleValue: v };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(fsVal) } };
  if (typeof v === 'object') { const f = {}; for (const k in v) f[k] = fsVal(v[k]); return { mapValue: { fields: f } }; }
  return { stringValue: String(v) };
}
function fromFs(fields) {
  if (!fields) return {};
  const o = {};
  for (const k in fields) {
    const v = fields[k];
    if ('stringValue' in v) o[k] = v.stringValue;
    else if ('doubleValue' in v) o[k] = v.doubleValue;
    else if ('integerValue' in v) o[k] = Number(v.integerValue);
    else if ('booleanValue' in v) o[k] = v.booleanValue;
    else if ('nullValue' in v) o[k] = null;
    else if ('arrayValue' in v) o[k] = (v.arrayValue.values || []).map(x => fromFs({ _: x })['_']);
    else if ('mapValue' in v) o[k] = fromFs(v.mapValue.fields || {});
  }
  return o;
}
async function loadData() {
  try {
    const r = await fetch(BASE + '/stones?key=' + API_KEY + '&pageSize=100');
    const j = await r.json();
    dataset = j.documents ? j.documents.map(d => ({ id: d.name.split('/').pop(), ...fromFs(d.fields) })) : [];
  } catch(e) { dataset = []; }
}
async function fsAdd(data) {
  const r = await fetch(BASE + '/stones?key=' + API_KEY, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: Object.fromEntries(Object.entries(data).map(([k,v]) => [k, fsVal(v)])) })
  });
  return r.json();
}
async function fsDelete(id) {
  await fetch(BASE + '/stones/' + id + '?key=' + API_KEY, { method: 'DELETE' });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() { showScreen('home'); }
function goScan() { showScreen('scan'); startCam('scanVideo'); }
function goAdd() {
  if (!isAdmin) { showScreen('adminLogin'); updateAdminUI(); return; }
  addShots = []; activeContacts = new Set();
  ['addName','addPhone','addTg','addEmail','addSite'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addCounter').textContent = '0/7 фото';
  document.getElementById('addSaveBtn').disabled = true;
  ['phone','tg','email','site'].forEach(k => {
    document.getElementById('tog-' + k).classList.remove('active');
    document.getElementById('wrap-' + k).classList.remove('visible');
  });
  renderStrip();
  showScreen('addStone');
  startCam('addVideo');
}
function goMyStones() {
  if (!isAdmin) { showScreen('adminLogin'); updateAdminUI(); return; }
  renderStonesList(); showScreen('myStones');
}
async function startCam(videoId) {
  const v = document.getElementById(videoId);
  try {
    if (sharedStream) { sharedStream.getTracks().forEach(t => t.stop()); sharedStream = null; }
    sharedStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1920 } } });
    v.srcObject = sharedStream; await v.play();
    const track = sharedStream.getVideoTracks()[0];
    if (track && track.applyConstraints) { try { await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch(e) {} }
    if (videoId === 'scanVideo') document.getElementById('scanHint').textContent = 'Наведите на камень и нажмите кнопку';
  } catch(e) {
    if (videoId === 'scanVideo') document.getElementById('scanHint').textContent = 'Камера недоступна';
  }
}
function tryLogin() {
  if (document.getElementById('adminPass').value === ADMIN_PASS) {
    isAdmin = true; sessionStorage.setItem('jk_admin', '1');
    document.getElementById('adminErr').style.display = 'none';
    document.getElementById('adminPass').value = ''; goHome();
  } else { document.getElementById('adminErr').style.display = 'block'; }
}
function doLogout() { isAdmin = false; sessionStorage.removeItem('jk_admin'); goHome(); }
function updateAdminUI() { document.getElementById('logoutBtn').style.display = isAdmin ? 'block' : 'none'; }

async function getEmbedding(dataUrl) {
  const resp = await fetch(EMBED_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: dataUrl }) });
  if (!resp.ok) throw new Error('Embed error: ' + resp.status);
  const j = await resp.json();
  if (j.error) throw new Error(j.error);
  return j.embedding;
}

async function shootPhoto() {
  if (addShots.length >= MAX_SHOTS) return;
  const v = document.getElementById('addVideo');
  if (!v.srcObject) return;
  const c = document.createElement('canvas');
  c.width = v.videoWidth || 640; c.height = v.videoHeight || 640;
  c.getContext('2d').drawImage(v, 0, 0);
  const dataUrl = await compressCanvas(c);
  showVeil('Анализ снимка…');
  try {
    const embedding = await getEmbedding(dataUrl);
    addShots.push({ dataUrl, features: embedding });
    renderStrip(); updateAddCounter();
  } catch(e) { alert('Ошибка сервера: ' + e.message); }
  finally { hideVeil(); }
}
function renderStrip() {
  const strip = document.getElementById('shotsStrip');
  strip.innerHTML = '';
  addShots.forEach((s, i) => {
    const img = document.createElement('img');
    img.className = 'shot-thumb'; img.src = s.dataUrl;
    img.onclick = () => { addShots.splice(i, 1); renderStrip(); updateAddCounter(); };
    strip.appendChild(img);
  });
  for (let i = addShots.length; i < MAX_SHOTS; i++) {
    const ph = document.createElement('div'); ph.className = 'shot-empty'; ph.textContent = '+';
    strip.appendChild(ph);
  }
}
function updateAddCounter() {
  const n = addShots.length;
  document.getElementById('addCounter').textContent = n + '/7 фото';
  document.getElementById('addSaveBtn').disabled = n < MIN_SHOTS;
  document.getElementById('addFormSub').textContent = n >= MIN_SHOTS ? 'Можно сохранить или добавить ещё' : 'Сделайте минимум 3 снимка с разных углов';
}
async function saveNewStone() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('Введите название'); return; }
  if (addShots.length < MIN_SHOTS) { alert('Нужно минимум ' + MIN_SHOTS + ' снимка'); return; }
  showVeil('Сохранение…');
  try {
    const tinyCover = await makeTiny(addShots[0].dataUrl, 200);
    const contacts = {};
    if (activeContacts.has('phone')) contacts.phone = document.getElementById('addPhone').value.trim();
    if (activeContacts.has('tg')) contacts.tg = document.getElementById('addTg').value.trim();
    if (activeContacts.has('email')) contacts.email = document.getElementById('addEmail').value.trim();
    if (activeContacts.has('site')) contacts.site = document.getElementById('addSite').value.trim();
    const stoneData = { name, contacts: JSON.stringify(contacts), createdAt: Date.now(), shotsCount: addShots.length, coverImage: tinyCover, features: addShots[0].features, shotsFeatures: addShots.map((s, i) => ({ idx: i, f: s.features })) };
    const result = await fsAdd(stoneData);
    if (result.error) { hideVeil(); alert('Firebase ошибка: ' + JSON.stringify(result.error)); return; }
    await loadData(); hideVeil(); renderStonesList(); showScreen('myStones');
  } catch(e) { hideVeil(); alert('Ошибка: ' + e.message); }
}
function renderStonesList() {
  const list = document.getElementById('stonesList');
  if (dataset.length === 0) { list.innerHTML = '<div class="empty-list"><div class="eg">◇</div><p>Камней пока нет</p></div>'; return; }
  list.innerHTML = '';
  dataset.forEach(s => {
    const row = document.createElement('div'); row.className = 'stone-row';
    const thumb = s.coverImage ? `<img class="stone-thumb" src="${s.coverImage}">` : `<div class="stone-thumb-ph">◈</div>`;
    const shots = s.shotsCount || 1;
    row.innerHTML = `${thumb}<div class="stone-info"><div class="stone-name">${esc(s.name)}</div><div class="stone-meta">${shots} снимк${shots===1?'':shots<5?'а':'ов'}</div></div><button class="stone-del" onclick="delStone('${s.id}',event)">Удалить</button>`;
    list.appendChild(row);
  });
}
async function delStone(id, e) {
  e.stopPropagation();
  if (!confirm('Удалить?')) return;
  showVeil('Удаление…'); await fsDelete(id); await loadData(); hideVeil(); renderStonesList();
}
async function doScan() {
  if (dataset.length === 0) { document.getElementById('scanHint').textContent = 'База пуста'; return; }
  const v = document.getElementById('scanVideo');
  if (!v.srcObject || !v.videoWidth) { document.getElementById('scanHint').textContent = 'Камера не готова'; return; }
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanBtn').textContent = 'Анализ…';
  document.getElementById('scanHint').textContent = 'Отправка на сервер…';
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  const src = await compressCanvas(c);
  let qf;
  try { qf = await getEmbedding(src); }
  catch(e) {
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('scanBtn').textContent = 'Идентифицировать';
    document.getElementById('scanHint').textContent = 'Ошибка: ' + e.message; return;
  }
  let best = null, bestScore = -1;
  for (const stone of dataset) {
    const allF = [];
    if (stone.features && stone.features.length) allF.push(stone.features);
    if (stone.shotsFeatures) stone.shotsFeatures.forEach(sf => { if (sf && sf.f && sf.f.length) allF.push(sf.f); });
    for (const f of allF) { const sc = cosine(qf, f); if (sc > bestScore) { bestScore = sc; best = stone; } }
  }
  document.getElementById('scanBtn').disabled = false;
  document.getElementById('scanBtn').textContent = 'Идентифицировать';
  if (best && bestScore >= THRESHOLD) {
    document.getElementById('scanHint').textContent = '✓ ' + best.name;
    document.getElementById('scanBadgeName').textContent = best.name;
    document.getElementById('scanBadgePct').textContent = (bestScore*100).toFixed(1) + '% совпадение';
    document.getElementById('scanBadge').style.display = 'block';
    document.getElementById('scanBadge').onclick = () => showResultDetail(best, bestScore);
    document.getElementById('scanBadge').style.cursor = 'pointer';
    const btn = document.getElementById('scanBtn');
    const _c = best.contacts ? JSON.parse(best.contacts) : {};
    if (_c.site) {
      const _url = _c.site.startsWith('http') ? _c.site : 'https://' + _c.site;
      btn.textContent = 'Открыть сайт →';
      btn.disabled = false;
      btn.onclick = () => { openLink(_url); };
    } else {
      btn.textContent = 'Показать результат →';
      btn.disabled = false;
      btn.onclick = () => showResultDetail(best, bestScore);
    }
  } else {
    document.getElementById('scanHint').textContent = '∅ Не найдено (' + (bestScore*100).toFixed(1) + '%)';
    document.getElementById('scanBadge').style.display = 'none';
    document.getElementById('scanBtn').textContent = 'Идентифицировать';
    document.getElementById('scanBtn').onclick = doScan;
  }
}

function showResultDetail(stone, score) {
  const img = document.getElementById('detailImg');
  if (stone.coverImage) { img.src = stone.coverImage; img.style.display = 'block'; } else img.style.display = 'none';
  document.getElementById('detailPct').textContent = (score*100).toFixed(1) + '%';
  document.getElementById('detailName').textContent = stone.name;
  document.getElementById('detailHash').textContent = stone.features ? 'ID: ' + hashF(stone.features) : '';

  const contacts = stone.contacts ? JSON.parse(stone.contacts) : {};
  const block = document.getElementById('detailContacts');
  block.innerHTML = '';

  const defs = [
    { key: 'phone', ico: '📞', label: 'Телефон', getUrl: v => 'tel:' + v },
    { key: 'tg',    ico: '✈️', label: 'Telegram', getUrl: v => 'https://t.me/' + v.replace('@','') },
    { key: 'email', ico: '✉️', label: 'Email',    getUrl: v => 'mailto:' + v },
    { key: 'site',  ico: '🔗', label: 'Сайт',     getUrl: v => v.startsWith('http') ? v : 'https://' + v },
  ];

  let qrData = stone.name + '\n';
  let hasContacts = false;

  defs.forEach(({ key, ico, label, getUrl }) => {
    const val = contacts[key];
    if (!val) return;
    hasContacts = true;
    qrData += label + ': ' + val + '\n';
    const url = getUrl(val);
    const div = document.createElement('div');
    div.className = 'contact-item';
    div.innerHTML = `<div class="contact-ico">${ico}</div><div class="contact-info"><div class="contact-label">${label}</div><div class="contact-value">${esc(val)}</div></div><div class="contact-arrow">›</div>`;
    div.onclick = () => openLink(url);
    block.appendChild(div);
  });

  const qrBlock = document.getElementById('qrBlock');
  const qrDiv = document.getElementById('qrCanvas');
  qrDiv.innerHTML = '';
  if (hasContacts) {
    qrBlock.style.display = 'flex';
    new QRCode(qrDiv, { text: qrData.trim(), width: 180, height: 180, colorDark: '#1a1a1a', colorLight: '#f5f2eb', correctLevel: QRCode.CorrectLevel.M });
  } else { qrBlock.style.display = 'none'; }

  showScreen('resultDetail');
}

function cosine(a, b) {
  let dot=0, na=0, nb=0;
  const len = Math.min(a.length, b.length);
  for (let i=0; i<len; i++) { dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9);
}
function hashF(f) {
  if (!f || !f.length) return '—';
  return CryptoJS.SHA256(f.slice(0,20).map(v => v.toFixed(4)).join(',')).toString().slice(0,16).toUpperCase();
}
async function compressCanvas(c) {
  const max=480, scale=Math.min(max/c.width, max/c.height, 1);
  const c2=document.createElement('canvas');
  c2.width=Math.round(c.width*scale); c2.height=Math.round(c.height*scale);
  c2.getContext('2d').drawImage(c, 0, 0, c2.width, c2.height);
  return c2.toDataURL('image/jpeg', 0.68);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function makeTiny(src, maxSize) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.5));
    };
    img.src = src;
  });
}
function showVeil(msg) {
  let el = document.getElementById('veil');
  if (!el) { el=document.createElement('div'); el.id='veil'; el.className='veil'; document.body.appendChild(el); }
  el.innerHTML = `<div class="veil-ring"></div><div class="veil-lbl">${msg}</div>`;
}
function hideVeil() { const el=document.getElementById('veil'); if(el) el.remove(); }
</script>
