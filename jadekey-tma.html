<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JadeKey</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Tenor+Sans&display=swap');
:root{--black:#0a0a0a;--black2:#111110;--black3:#1a1a18;--surface:#161614;--border:rgba(255,255,255,0.07);--border-b:rgba(255,255,255,0.14);--gold:#b8975a;--gold-l:#d4b078;--gold-d:rgba(184,151,90,0.3);--white:#f0ede6;--white-d:rgba(240,237,230,0.45);--white-f:rgba(240,237,230,0.18);--green:#5d9988;--gap:20px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'Tenor Sans',sans-serif;overflow-x:hidden;}
.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px var(--gap);background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;letter-spacing:0.22em;}
.logo em{font-style:italic;color:var(--gold);}
.header-meta{display:flex;align-items:center;gap:12px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 3s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.meta{font-size:10px;letter-spacing:0.15em;color:var(--white-d);text-transform:uppercase;}
.owner-pill{font-size:9px;letter-spacing:0.2em;color:var(--gold);border:1px solid var(--gold-d);padding:3px 8px;border-radius:20px;}
.tabs{display:flex;background:var(--black2);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--white-d);cursor:pointer;transition:color 0.3s;position:relative;}
.tab.active{color:var(--white);}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.tab.hidden{display:none;}
.screen{display:none;}.screen.active{display:block;animation:rev 0.35s ease;}
@keyframes rev{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.vf{position:relative;width:100%;aspect-ratio:1;border-radius:4px;overflow:hidden;background:var(--black3);margin-bottom:20px;}
#videoEl,#canvasEl{width:100%;height:100%;object-fit:cover;display:block;}
#canvasEl{display:none;position:absolute;inset:0;}
.vf-vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.55) 100%);pointer-events:none;}
.vf-ui{position:absolute;inset:0;pointer-events:none;}
.corner{position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid;opacity:0.55;}
.corner.tl{top:16px;left:16px;border-width:1px 0 0 1px;}.corner.tr{top:16px;right:16px;border-width:1px 1px 0 0;}
.corner.bl{bottom:16px;left:16px;border-width:0 0 1px 1px;}.corner.br{bottom:16px;right:16px;border-width:0 1px 1px 0;}
.reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border:1px solid rgba(184,151,90,0.2);border-radius:50%;}
.scanline{position:absolute;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-l),transparent);top:16px;animation:scan 3s ease-in-out infinite;opacity:0;transition:opacity 0.4s;}
.scanning .scanline{opacity:0.7;}
@keyframes scan{0%,100%{top:10%}50%{top:88%}}
.vf-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(184,151,90,0.5);}
.scan-status{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);text-align:center;min-height:22px;margin-bottom:16px;}
.ctrls{display:flex;gap:10px;margin-bottom:12px;}
.ctrl{flex:1;padding:14px;background:transparent;border:1px solid var(--border-b);border-radius:2px;color:var(--white-d);font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.ctrl:active{background:var(--white-f);color:var(--white);}
.scan-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--gold) 0%,#8b6d35 100%);border:none;border-radius:2px;color:var(--black);font-family:'Playfair Display',serif;font-size:15px;letter-spacing:0.22em;cursor:pointer;transition:opacity 0.2s;}
.scan-btn:disabled{background:var(--surface);color:var(--white-f);border:1px solid var(--border);}
.scan-btn:not(:disabled):active{opacity:0.85;}
.result-card{background:var(--surface);border:1px solid var(--border-b);border-radius:4px;overflow:hidden;margin-top:24px;animation:rev 0.4s ease;}
.result-card.match{border-color:rgba(184,151,90,0.3);}
.result-card.no-match{border-color:rgba(139,58,58,0.3);}
.res-img{width:100%;height:150px;object-fit:cover;display:block;filter:brightness(0.85);}
.res-body{padding:20px;}
.res-pct-row{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
.res-pct{font-family:'Playfair Display',serif;font-size:36px;color:var(--gold-l);line-height:1;}
.res-lbl{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--white-d);}
.res-bar{height:1px;background:var(--border);margin-bottom:16px;position:relative;overflow:hidden;}
.res-bar-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold-l));transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
.res-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:6px;}
.res-desc{font-size:13px;color:var(--white-d);line-height:1.6;font-style:italic;margin-bottom:20px;}
.res-hash{font-size:9px;letter-spacing:0.1em;color:rgba(184,151,90,0.3);margin-bottom:20px;word-break:break-all;}
.clink{display:flex;align-items:center;gap:14px;padding:16px;background:rgba(184,151,90,0.06);border:1px solid rgba(184,151,90,0.2);border-radius:2px;color:var(--white);text-decoration:none;transition:all 0.2s;}
.clink:active{background:rgba(184,151,90,0.12);}
.clink-ico{width:36px;height:36px;border:1px solid rgba(184,151,90,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.clink-main{font-size:13px;letter-spacing:0.08em;margin-bottom:2px;}

.nav-hint{font-size:10px;letter-spacing:0.12em;color:var(--white-f);margin-top:10px;text-align:center;}
.no-match-inner{padding:32px 20px;text-align:center;}

.no-match-t{font-family:'Playfair Display',serif;font-size:18px;color:var(--white-d);font-weight:400;margin-bottom:6px;}

.ds-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;}

.add-btn{padding:10px 18px;background:transparent;border:1px solid rgba(184,151,90,0.4);border-radius:2px;color:var(--gold-l);font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;}
.add-btn:active{background:rgba(184,151,90,0.08);}

.login-eye{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.login-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;margin-bottom:6px;}

.inp{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border-b);border-radius:2px;color:var(--white);font-family:'Tenor Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.25s;margin-bottom:20px;}

.panel-card{background:var(--surface);border:1px solid rgba(184,151,90,0.2);border-radius:4px;padding:24px;text-align:center;margin-bottom:16px;}
.panel-g{font-size:36px;color:var(--gold);margin-bottom:12px;}

.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;animation:ov 0.2s ease;}
@keyframes ov{from{opacity:0}to{opacity:1}}
.sheet{background:var(--black2);border:1px solid var(--border-b);border-bottom:none;border-radius:12px 12px 0 0;padding:24px var(--gap) 40px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:su 0.3s cubic-bezier(0.16,1,0.3,1);}
@keyframes su{from{transform:translateY(60px)}to{transform:none}}
.handle{width:36px;height:3px;background:var(--border-b);border-radius:2px;margin:0 auto 24px;}
.sheet-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-bottom:24px;color:var(--gold-l);}
.photo-drop{width:100%;aspect-ratio:1;background:var(--surface);border:1px dashed rgba(184,151,90,0.25);border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:20px;position:relative;overflow:hidden;}
.photo-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.drop-ico{font-size:28px;opacity:0.3;}
.drop-txt{font-size:11px;letter-spacing:0.12em;color:var(--white-f);}
.lt-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.lt-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border-b);background:transparent;color:var(--white-d);font-size:12px;cursor:pointer;font-family:'Tenor Sans',sans-serif;transition:all 0.2s;}
.lt-btn.active{background:rgba(184,151,90,0.15);border-color:rgba(184,151,90,0.5);color:var(--gold-l);}
.prim-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold) 0%,#8b6d35 100%);border:none;border-radius:2px;color:var(--black);font-family:'Playfair Display',serif;font-size:15px;letter-spacing:0.15em;cursor:pointer;margin-top:8px;}
.prim-btn:active{opacity:0.85;}
.ghost-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--white-d);font-family:'Tenor Sans',sans-serif;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;margin-top:10px;}
.ghost-btn:active{background:var(--white-f);}
.danger-btn{width:100%;padding:12px;background:transparent;border:1px solid rgba(139,58,58,0.35);border-radius:2px;color:#c47070;font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;margin-top:10px;}
.saving-veil{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.ring{width:36px;height:36px;border:2px solid rgba(184,151,90,0.2);border-top-color:var(--gold-l);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.saving-lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);}
input[type=file]{display:none;}
</style>
</head>

<script>
// ══ FIRESTORE REST API — no SDK needed ══
const PROJECT = 'jadekey-46f37';
const API_KEY = 'AIzaSyCmc4qJFC0rkFvcz7ZBG42ApnZfCcrrT20';
const BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT + '/databases/(default)/documents';
const ADMIN_PASSWORD = 'jadekey2024';
const THRESHOLD = 0.80;

let dataset = [];
let isAdmin = false;
let imgData = null;
let stream = null;
let camActive = false;
let ltType = 'url';
let editId = null;
let detailStone = null;
let modalImg = null;

// ── FIRESTORE REST helpers ──
function fsVal(v) {
  if (v === null || v === undefined) return {nullValue: null};
  if (typeof v === 'string') return {stringValue: v};
  if (typeof v === 'number') return {doubleValue: v};
  if (typeof v === 'boolean') return {booleanValue: v};
  if (Array.isArray(v)) return {arrayValue: {values: v.map(fsVal)}};
  if (typeof v === 'object') {
    const fields = {};
    for (const k in v) fields[k] = fsVal(v[k]);
    return {mapValue: {fields}};
  }
  return {stringValue: String(v)};
}

function fromFs(fields) {
  if (!fields) return {};
  const obj = {};
  for (const k in fields) {
    const v = fields[k];
    if ('stringValue' in v) obj[k] = v.stringValue;
    else if ('doubleValue' in v) obj[k] = v.doubleValue;
    else if ('integerValue' in v) obj[k] = Number(v.integerValue);
    else if ('booleanValue' in v) obj[k] = v.booleanValue;
    else if ('nullValue' in v) obj[k] = null;
    else if ('arrayValue' in v) obj[k] = (v.arrayValue.values || []).map(x => fromFs({_:x})['_']);
    else if ('mapValue' in v) obj[k] = fromFs(v.mapValue.fields || {});
  }
  return obj;
}

function toFsFields(obj) {
  const fields = {};
  for (const k in obj) fields[k] = fsVal(obj[k]);
  return fields;
}

async function fsGet() {
  try {
    const r = await fetch(BASE + '/stones?key=' + API_KEY + '&pageSize=50');
    const json = await r.json();
    if (!json.documents) return [];
    return json.documents.map(d => {
      const id = d.name.split('/').pop();
      return {id, ...fromFs(d.fields)};
    });
  } catch(e) { return []; }
}

async function fsAdd(data) {
  const body = {fields: toFsFields(data)};
  const r = await fetch(BASE + '/stones?key=' + API_KEY, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return await r.json();
}

async function fsUpdate(id, data) {
  const fields = toFsFields(data);
  const updateMask = Object.keys(data).map(k => 'updateMask.fieldPaths=' + k).join('&');
  const r = await fetch(BASE + '/stones/' + id + '?' + updateMask + '&key=' + API_KEY, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({fields})
  });
  return await r.json();
}

async function fsDelete(id) {
  await fetch(BASE + '/stones/' + id + '?key=' + API_KEY, {method: 'DELETE'});
}

async function loadData() {
  dataset = await fsGet();
  document.getElementById('metaText').textContent = dataset.length + ' камней';
  document.getElementById('dsCnt').textContent = dataset.length + ' образцов';
  renderGrid();
}
loadData();
setInterval(loadData, 30000); // refresh every 30s

function switchTab(name) {

  });

// ── CAMERA ──
async function startCam() {
  setSt('Запуск камеры…');
  try {
    if (stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment', width:{ideal:1920}, height:{ideal:1920}}
    });
    const track = stream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
      try { await track.applyConstraints({advanced:[{focusMode:'continuous'}]}); } catch(e){}
    }
    const v = document.getElementById('videoEl');
    v.srcObject = stream; v.style.display='block';
    document.getElementById('canvasEl').style.display='none';
    camActive=true; imgData=null;
    document.getElementById('scanBtn').disabled=false;
    document.getElementById('vfHint').textContent='Поднесите камень';
    setSt('');
    document.getElementById('resultArea').innerHTML='';
  } catch(e) { setSt('Используйте кнопку «Фото»'); }
}

function loadFile(e) {
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    imgData=ev.target.result;
    const img=new Image(), c=document.getElementById('canvasEl'), ctx=c.getContext('2d');
    img.onload=()=>{c.width=img.width;c.height=img.height;ctx.drawImage(img,0,0);document.getElementById('videoEl').style.display='none';c.style.display='block';};
    img.src=imgData;
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;camActive=false;}
    document.getElementById('scanBtn').disabled=false;
    document.getElementById('vfHint').textContent='Изображение загружено';
    setSt(''); document.getElementById('resultArea').innerHTML='';
  };
  r.readAsDataURL(file); e.target.value='';
}

window.addEventListener('load', () => { startCam(); });

// ── FEATURES ──
function getFeatures(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const s=128, c=document.createElement('canvas');
      c.width=s; c.height=s;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,s,s);
      resolve(extractF(ctx.getImageData(0,0,s,s).data,s,s));
    };
    img.src=src;
  });
}

function extractF(data,W,H){
  const f=[];
  const bins=32;
  const hR=new Array(bins).fill(0),hG=new Array(bins).fill(0),hB=new Array(bins).fill(0);
  const total=W*H;
  for(let i=0;i<data.length;i+=4){hR[Math.floor(data[i]/(256/bins))]++;hG[Math.floor(data[i+1]/(256/bins))]++;hB[Math.floor(data[i+2]/(256/bins))]++;}
  hR.forEach(v=>f.push(v/total));hG.forEach(v=>f.push(v/total));hB.forEach(v=>f.push(v/total));
  const gN=4,cW=Math.floor(W/gN),cH=Math.floor(H/gN);
  for(let gy=0;gy<gN;gy++)for(let gx=0;gx<gN;gx++){
    let sR=0,sG=0,sB=0,cnt=0,ssR=0,ssG=0,ssB=0;
    for(let y=gy*cH;y<(gy+1)*cH&&y<H;y++)for(let x=gx*cW;x<(gx+1)*cW&&x<W;x++){const idx=(y*W+x)*4;sR+=data[idx];sG+=data[idx+1];sB+=data[idx+2];cnt++;}
    const mR=sR/cnt/255,mG=sG/cnt/255,mB=sB/cnt/255;
    for(let y=gy*cH;y<(gy+1)*cH&&y<H;y++)for(let x=gx*cW;x<(gx+1)*cW&&x<W;x++){const idx=(y*W+x)*4;ssR+=Math.pow(data[idx]/255-mR,2);ssG+=Math.pow(data[idx+1]/255-mG,2);ssB+=Math.pow(data[idx+2]/255-mB,2);}
    f.push(mR,mG,mB,Math.sqrt(ssR/cnt),Math.sqrt(ssG/cnt),Math.sqrt(ssB/cnt));
  }
  const zones=[[0,0,0.5,0.5],[0.5,0,1,0.5],[0,0.5,0.5,1],[0.5,0.5,1,1]];
  for(const[x0,y0,x1,y1]of zones){
    let e=0,cnt=0;
    for(let y=Math.floor(y0*H)+1;y<Math.floor(y1*H)-1;y++)for(let x=Math.floor(x0*W)+1;x<Math.floor(x1*W)-1;x++){
      const g=(px,py)=>{const idx=(py*W+px)*4;return(data[idx]*0.299+data[idx+1]*0.587+data[idx+2]*0.114)/255;};
      const gx2=g(x+1,y)-g(x-1,y),gy2=g(x,y+1)-g(x,y-1);e+=Math.sqrt(gx2*gx2+gy2*gy2);cnt++;
    }
    f.push(e/cnt);
  }
  const hh=new Array(16).fill(0);
  for(let i=0;i<data.length;i+=4){const r=data[i]/255,g=data[i+1]/255,b=data[i+2]/255,max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;if(d<0.05)continue;let h=0;if(max===r)h=(g-b)/d%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=((h*60)+360)%360;hh[Math.floor(h/22.5)]++;}
  const ht=hh.reduce((a,b)=>a+b,1);hh.forEach(v=>f.push(v/ht));
  return f;
}

function cosine(a,b){let dot=0,na=0,nb=0;const len=Math.min(a.length,b.length);for(let i=0;i<len;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return dot/(Math.sqrt(na)*Math.sqrt(nb)+1e-9);}
function hashF(f){return CryptoJS.SHA256(f.slice(0,20).map(v=>v.toFixed(3)).join(',')).toString().slice(0,16).toUpperCase();}

// ── SCAN ──
async function doScan() {
  if (dataset.length===0) { showNoMatch(null); return; }
  let src=imgData;
  if (camActive&&!src) {
    const v=document.getElementById('videoEl'),c=document.getElementById('canvasEl'),ctx=c.getContext('2d');
    c.width=v.videoWidth||640;c.height=v.videoHeight||640;
    ctx.drawImage(v,0,0);src=c.toDataURL('image/jpeg',0.9);
    c.style.display='block';v.style.display='none';
  }
  if (!src) { setSt('Нет изображения'); return; }
  document.getElementById('vf').classList.add('scanning');
  document.getElementById('scanBtn').disabled=true;
  document.getElementById('scanBtn').textContent='Анализ...';
  setSt('Извлечение паттернов…');
  document.getElementById('resultArea').innerHTML='';
  await new Promise(r=>setTimeout(r,60));
  const qf=await getFeatures(src);
  const qh=hashF(qf);
  let best=null,bestScore=-1;
  for(const s of dataset){
    if(!s.features)continue;
    const f=Array.isArray(s.features)?s.features:[];
    const sc=cosine(qf,f);
    if(sc>bestScore){bestScore=sc;best=s;}
  }
  document.getElementById('vf').classList.remove('scanning');
  document.getElementById('scanBtn').disabled=false;
  document.getElementById('scanBtn').textContent='Идентифицировать';
  if(best&&bestScore>=THRESHOLD){
    setSt('✓ '+(bestScore*100).toFixed(1)+'%  ·  '+qh);
    showMatch(best,bestScore);
    if(best.link) setTimeout(()=>window.open(buildHref(best.linkType,best.link),'_blank'),1500);
  } else {
    setSt('∅ не идентифицировано  ·  '+qh);
    showNoMatch(bestScore);
  }
}

function setSt(t){document.getElementById('scanSt').textContent=t;}

function showMatch(stone,score){
  const pct=(score*100).toFixed(1);
  const thumb=stone.imageData?`<img class="res-img" src="${stone.imageData}">`:'';
  const contact=stone.link?buildCLink(stone):'';
  document.getElementById('resultArea').innerHTML=`<div class="result-card match">${thumb}<div class="res-body"><div class="res-pct-row"><div class="res-pct">${pct}<span style="font-size:16px;color:var(--white-d)">%</span></div><div class="res-lbl">Совпадение</div></div><div class="res-bar"><div class="res-bar-fill" style="width:${pct}%"></div></div><div class="res-name">${esc(stone.name)}</div>${stone.desc?`<div class="res-desc">${esc(stone.desc)}</div>`:''}<div class="res-hash">ID: ${hashF(stone.features||[])}</div>${contact}${stone.link?'<div class="nav-hint">Переход через 1.5 с…</div>':''}</div></div>`;
}

function showNoMatch(score){
  document.getElementById('resultArea').innerHTML=`<div class="result-card no-match"><div class="no-match-inner"><div class="no-match-g">◇</div><div class="no-match-t">Не идентифицировано</div><div class="no-match-s">${score!==null?'Ближайшее: '+(score*100).toFixed(1)+'%':'Добавьте образцы в коллекцию'}</div></div></div>`;
}

function buildCLink(stone){
  const icons={url:'🔗',tg:'✈️',email:'✉️',phone:'📞'};
  const labels={url:'Перейти на сайт',tg:'Telegram',email:'Email',phone:'Позвонить'};
  return`<a class="clink" href="${buildHref(stone.linkType,stone.link)}" target="_blank"><div class="clink-ico">${icons[stone.linkType]||'🔗'}</div><div><div class="clink-main">${labels[stone.linkType]||'Перейти'}</div><div class="clink-sub">${esc(stone.link)}</div></div></a>`;
}

function buildHref(type,val){if(type==='email')return`mailto:${val}`;if(type==='phone')return`tel:${val}`;if(type==='tg')return val.startsWith('http')?val:`https://t.me/${val.replace('@','')}`;return val.startsWith('http')?val:'https://'+val;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── GRID ──
function renderGrid(){
  if(!isAdmin)return;
  const grid=document.getElementById('grid'),empty=document.getElementById('emptyEl');
  grid.innerHTML='';
  if(dataset.length===0){empty.style.display='block';return;}
  empty.style.display='none';
  dataset.forEach(s=>{
    const tile=document.createElement('div');tile.className='tile';
    const img=s.imageData?`<img class="tile-img" src="${s.imageData}" loading="lazy">`:`<div class="tile-ph">◈</div>`;
    tile.innerHTML=`${img}<div class="tile-info"><div class="tile-name">${esc(s.name)}</div><div class="tile-link">${esc(s.link||'—')}</div></div>`;
    tile.onclick=()=>openDetail(s);
    grid.appendChild(tile);
  });
}

// ── ADD/EDIT ──
function openAdd(){
  if(!isAdmin)return;
  editId=null;modalImg=null;
  document.getElementById('sheetTit').textContent='Новый образец';
  document.getElementById('sName').value='';document.getElementById('sDesc').value='';document.getElementById('sLink').value='';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('dropIco').style.display='block';document.getElementById('dropTxt').style.display='block';
  document.getElementById('delBtn').style.display='none';
  setLtRaw('url');
  document.getElementById('addSheet').style.display='flex';
}

function setLt(btn,type){document.querySelectorAll('.lt-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');ltType=type;const ph={url:'https://...',tg:'@username',email:'info@...',phone:'+7...'};document.getElementById('sLink').placeholder=ph[type]||'';}
function setLtRaw(type){ltType=type;const t=['url','tg','email','phone'];document.querySelectorAll('.lt-btn').forEach((b,i)=>b.classList.toggle('active',t[i]===type));}

function onPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{modalImg=ev.target.result;document.getElementById('photoPreview').src=modalImg;document.getElementById('photoPreview').style.display='block';document.getElementById('dropIco').style.display='none';document.getElementById('dropTxt').style.display='none';};
  r.readAsDataURL(file);e.target.value='';
}

async function compress(src){return new Promise(res=>{const img=new Image();img.onload=()=>{const max=480,scale=Math.min(max/img.width,max/img.height,1);const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.65));};img.src=src;});}

async function saveStone(){
  if(!isAdmin)return;
  const name=document.getElementById('sName').value.trim();
  if(!name){alert('Введите название');return;}
  showSaving(true);
  try{
    let features=null,imageData=null;
    if(modalImg){features=await getFeatures(modalImg);imageData=await compress(modalImg);}
    const data={name,desc:document.getElementById('sDesc').value.trim(),link:document.getElementById('sLink').value.trim(),linkType:ltType,updatedAt:Date.now()};
    if(features)data.features=features;
    if(imageData)data.imageData=imageData;
    if(editId){
      if(!modalImg){const ex=dataset.find(s=>s.id===editId);if(ex?.imageData)data.imageData=ex.imageData;if(ex?.features)data.features=ex.features;}
      await fsUpdate(editId,data);
    }else{await fsAdd(data);}
    document.getElementById('addSheet').style.display='none';
    await loadData();
  }catch(e){alert('Ошибка: '+e.message);}
  finally{showSaving(false);}
}

async function deleteStone(){
  if(!isAdmin||!editId)return;
  if(!confirm('Удалить образец?'))return;
  showSaving(true);
  try{await fsDelete(editId);document.getElementById('addSheet').style.display='none';document.getElementById('detailSheet').style.display='none';await loadData();}
  catch(e){alert('Ошибка: '+e.message);}
  finally{showSaving(false);}
}

// ── DETAIL ──
function openDetail(s){
  detailStone=s;
  const img=document.getElementById('dImg');
  if(s.imageData){img.src=s.imageData;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('dName').textContent=s.name;
  document.getElementById('dDesc').textContent=s.desc||'';
  document.getElementById('dHash').textContent=s.features?'ID: '+hashF(s.features):'';
  const icons={url:'🔗',tg:'✈️',email:'✉️',phone:'📞'};
  const labels={url:'Открыть сайт',tg:'Telegram',email:'Email',phone:'Телефон'};
  document.getElementById('dIco').textContent=icons[s.linkType]||'🔗';
  document.getElementById('dLbl').textContent=labels[s.linkType]||'Перейти';
  document.getElementById('dSub').textContent=s.link||'—';
  document.getElementById('dLink').href=s.link?buildHref(s.linkType,s.link):'#';
  document.getElementById('editBtn').style.display=isAdmin?'block':'none';
  document.getElementById('detailSheet').style.display='flex';
}

function editStone(){
  if(!isAdmin)return;
  editId=detailStone.id;modalImg=null;
  document.getElementById('sheetTit').textContent='Редактировать';
  document.getElementById('sName').value=detailStone.name;
  document.getElementById('sDesc').value=detailStone.desc||'';
  document.getElementById('sLink').value=detailStone.link||'';
  if(detailStone.imageData){document.getElementById('photoPreview').src=detailStone.imageData;document.getElementById('photoPreview').style.display='block';document.getElementById('dropIco').style.display='none';document.getElementById('dropTxt').style.display='none';}
  else{document.getElementById('photoPreview').style.display='none';document.getElementById('dropIco').style.display='block';document.getElementById('dropTxt').style.display='block';}
  setLtRaw(detailStone.linkType||'url');
  document.getElementById('delBtn').style.display='block';
  document.getElementById('detailSheet').style.display='none';
  document.getElementById('addSheet').style.display='flex';
}

function showSaving(show){let el=document.getElementById('sv');if(show&&!el){el=document.createElement('div');el.id='sv';el.className='saving-veil';el.innerHTML='<div class="ring"></div><div class="saving-lbl">Сохранение</div>';document.body.appendChild(el);}else if(!show&&el)el.remove();}
</script>
